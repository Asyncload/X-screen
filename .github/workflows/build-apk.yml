name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (很多老项目需要 Java 11，新项目需要 17)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. 安装 Android SDK (这是关键，防止找不到 Android 版本)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # 4. 授予权限 (尝试创建 gradlew 如果不存在，或者修复权限)
      - name: Make gradlew executable
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "gradlew not found, relying on system gradle"
          fi

      # 5. 编译 (先尝试用 gradlew，如果不行再用 gradle)
      - name: Build Debug APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug --stacktrace
          else
            gradle assembleDebug --stacktrace
          fi

      # 6. 上传到 Release
      - name: Upload to Release
        uses: "ncipollo/release-action@v1"
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "app/build/outputs/apk/debug/*.apk"
          name: "Auto Build ${{ github.run_number }}"
          tag: "build-${{ github.run_id }}"
          allowUpdates: true
          replacesArtifacts: true
